<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор заказов — DECOR BONJOUR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== ШАПКА ===== -->
<header class="header">
    <div class="header-content">
        <div class="company-info">
            <h1>DECOR BONJOUR</h1>
            <p class="phone-icon">+7 918 555 80 94</p>
            <p class="phone-icon">+7 918 555 80 96</p>
            <p class="address-icon">пр. Сиверса 23</p>
        </div>
        <div class="client-info">
            <input type="text" id="clientName" placeholder="ФИО клиента">
            <input type="text" id="clientPhone" placeholder="Телефон">
            <input type="text" id="clientAddress" placeholder="Адрес">
        </div>
        <div class="header-buttons">
            <button class="btn-header" onclick="openPriceList()">📋 Прайс</button>
            <button class="btn-header" onclick="openSettings()">⚙️ Настройки</button>
            <button class="btn-header" onclick="openSuppliersModal()">🏭 Поставщики</button>
            <button class="btn-header btn-new-order" onclick="newOrder()">🔄 Новый заказ</button>
        </div>
    </div>
</header>

<!-- ===== ОСНОВНОЙ КОНТЕНТ ===== -->
<main class="main-content">
    <div id="roomsContainer"></div>
    
    <div class="room-controls">
        <button class="btn-add-room" onclick="addRoom()">+ Добавить комнату</button>
    </div>

    <!-- ===== ОБЩАЯ СУММА ===== -->
    <div class="grand-total-bar">
        <div>
            <div class="grand-total-label">ОБЩАЯ СУММА ЗАКАЗА</div>
            <div class="grand-total-value" id="grandTotal">0 ₽</div>
        </div>
        <div class="grand-total-buttons">
            <button class="btn-pdf" onclick="generatePDF()">📄 Скачать PDF</button>
        </div>
    </div>
</main>

<!-- ===== МОДАЛКА: ПРАЙС-ЛИСТ ===== -->
<div class="modal-overlay" id="priceListModal">
    <div class="modal">
        <h2>📋 Прайс-лист</h2>
        <table>
            <thead>
                <tr>
                    <th>Наименование</th>
                    <th>Цена (закупочная)</th>
                    <th>Цена продажи</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="priceListBody"></tbody>
        </table>
        <div class="modal-add-row">
            <input type="text" id="newPriceName" placeholder="Наименование">
            <input type="number" id="newPriceCost" placeholder="Закупочная">
            <input type="number" id="newPriceSell" placeholder="Розничная">
            <button class="btn btn-add" onclick="addPriceItem()">+ Добавить</button>
        </div>
        <div class="modal-buttons">
            <button class="btn-modal-close" onclick="closePriceList()">Закрыть</button>
        </div>
    </div>
</div>

<!-- ===== МОДАЛКА: НАСТРОЙКИ ===== -->
<div class="modal-overlay" id="settingsModal">
    <div class="modal">
        <h2>⚙️ Настройки</h2>
        <div id="settingsContent"></div>
        <div class="modal-buttons">
            <button class="btn-modal-close" onclick="closeSettings()">Закрыть</button>
            <button class="btn-modal-save" onclick="saveSettings()">💾 Сохранить</button>
        </div>
    </div>
</div>

<!-- ===== МОДАЛКА: ПОСТАВЩИКИ ===== -->
<div class="modal-overlay" id="suppliersModal">
    <div class="modal">
        <h2>🏭 Поставщики</h2>
        <div id="suppliersContent"></div>
        <div class="modal-add-row">
            <input type="text" id="newSupplierName" placeholder="Название поставщика">
            <button class="btn btn-add" onclick="addSupplierManual()">+ Добавить</button>
        </div>
        <div class="modal-buttons">
            <button class="btn-modal-close" onclick="closeSuppliersModal()">Закрыть</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
